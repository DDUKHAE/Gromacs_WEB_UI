name: pytest

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  unit-and-contract:
    name: Unit + contract (no GROMACS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest matplotlib

      - name: Probe environment
        run: python scripts/check_gromacs_env.py

      - name: Run unit + contract tests
        run: pytest tests/unit tests/contract -v

      - name: Collect integration tests (skip without gmx)
        run: pytest tests/integration -v --collect-only
